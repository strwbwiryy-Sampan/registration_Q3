<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RateRunner Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        footer {
            background-color: #777;
            padding: 10px;
            text-align: center;
            color: white;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

    <main class="flex-grow-1 d-flex flex-column">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container-fluid">
                <a class="navbar-brand"><img src="logo.png" alt="Logo" class="rounded-circle" style="height: 40px;"></a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="mynavbar">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item"><a class="nav-link" href="https://bananaman4262arada.github.io/CAlculatory/">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="https://bananaman4262arada.github.io/ActualCalculator/">Calculator</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Log In</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <div class="flex-grow-1 d-flex justify-content-center align-items-center py-5" style="background-color:#d2ebf9;">
        <article class="p-4 shadow rounded" style="max-width:500px; width: 100%; background-color: #43abff; font-family: Helvetica;">
            <h1 class="text-center">REGISTRATION</h1>
                
        <form onsubmit="event.preventDefault(); alert('Your account has now been created.');">
            <div class="text-center mb-3">
                <img src="https://i.pinimg.com/originals/0f/68/94/0f6894e539589a50809e45833c8bb6c4.jpg" alt="Avatar" class="rounded-circle" style="width:150px;">
            </div>

            <input type="file" id="myFile" name="filename">
            <input type="submit">

            <br><br>
                    
            <div class="mb-2">
                <label for="fname" class="fw-bold">First Name</label>
                <input type="text" class="form-control" id="fname" placeholder="Enter first name" required>
            </div>
            <div class="mb-2">
                <label for="lname" class="fw-bold">Last Name</label>
                <input type="text" class="form-control" id="lname" placeholder="Enter last name" required>
            </div>
            <div class="row">
            <div class="col mb-2">
                <label for="age" class="fw-bold">Age</label>
                <input type="number" class="form-control" id="age" placeholder="Age">
            </div>
            <div class="col mb-2">
                <label for="contact" class="fw-bold">Contact</label>
                <input type="number" class="form-control" id="contact" placeholder="Number">
            </div>
            </div>
            <div class="mb-2">
                <label for="email" class="fw-bold">Email</label>
                <input type="email" class="form-control" id="email" placeholder="Enter email">
            </div>
            <div class="mb-3">
                <label for="password" class="fw-bold">Password</label>
                <input type="password" class="form-control" id="password" placeholder="Enter password">
            </div>
            <div class="form-check mb-3">
                <input type="checkbox" class="form-check-input" id="check1" required>
                <label class="form-check-label" for="check1">I accept the Terms of Use and Privacy Policy</label>
            </div>
            <button type="submit" class="btn btn-dark w-100">Create Account</button>
        </form>
        </article>
        </div>
    </main>

    <footer class="mt-auto">
        <p>Arada, Sampan, Oquendo | 9-Jade</p>
    </footer>

    <script>
        window.onload = () => alert('To register, click "Ok".');
    </script>

</body>
</html>
